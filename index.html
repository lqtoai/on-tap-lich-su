<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Tập Lịch Sử - Phong cách Wayground</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div class="stats">
                <span id="question-number">Câu 1/86</span>
            </div>
        </header>

        <main id="quiz-area">
            <div id="question-text" class="question-text">
                </div>
            <div id="options-container" class="options-grid">
                </div>
        </main>

        <footer>
    <div class="button-group">
        <button id="prev-btn" class="btn-secondary" style="display: none;">Quay lại</button>
        <button id="next-btn" class="btn-next" style="display: none;">Tiếp theo</button>
    </div>
</footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
